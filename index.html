<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Frisbeegolf Kalenteri</title>

  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #f4f6f8;
    }

    h1 {
      text-align: center;
    }

    #calendar {
      max-width: 1300px;
      margin: 20px auto;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.12);
    }

    .fc {
      font-size: 14px;
    }

    .fc-daygrid-day-frame {
      min-height: 110px;
    }

    /* ===== MODAL ===== */
    .modal {
      display: none;
      position: fixed;
      z-index: 9999;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.5);
    }

    .modal-content {
      background-color: white;
      margin: 10% auto;
      padding: 20px;
      width: 400px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .close {
      float: right;
      font-size: 22px;
      cursor: pointer;
    }

    .event-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .event-info {
      margin-top: 10px;
      line-height: 1.5;
    }
  </style>
</head>

// =======================
// NORMALIZE
// =======================
function normalize(str) {
  return str
    .toLowerCase()
    .replace("frisbeegolfrata", "")
    .replace("frisbeegolfpuisto", "")
    .replace("disc golf", "")
    .replace("dgp", "")
    .replace(/[()]/g, "")
    .trim();
}

// =======================
// FREE COURSES
// =======================
function getFreeCourses(dateStr, selectedCity = "all") {

  const busy = events
    .filter(e => e.start.startsWith(dateStr))
    .map(e => normalize(e.title));

  return allCourses.filter(c => {
    const matchesCity = selectedCity === "all" || c.city === selectedCity;
    const isBusy = busy.some(b => b.includes(normalize(c.name)));

    return matchesCity && !isBusy;
  });
}

  for (let i = 0; i < lines.length; i += 2) {
    const titleLine = lines[i];
    const infoLine = lines[i + 1];

    if (!infoLine) continue;

    const parts = infoLine.split("\t");

    const dateTime = parts[1];
    const coursePart = parts[3];

    if (!dateTime || !coursePart) continue;

    const [date, time] = dateTime.split(" ");
    const [day, month, year] = date.split("/");

    const formattedDate = `${year}-${month}-${day}T${time}`;

    const course = coursePart.split("→")[0].trim();

    events.push({
      title: `${course}`,
      start: formattedDate,
      extendedProps: {
        fullTitle: titleLine,
        course: course,
        time: time
      }
    });
  }

  const calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
    initialView: 'dayGridMonth',
    firstDay: 1,
    locale: 'fi',

    events: events,

    eventClick: function(info) {
      document.getElementById("modalTitle").innerText = info.event.extendedProps.fullTitle;
      document.getElementById("modalInfo").innerHTML = `
        <b>Rata:</b> ${info.event.extendedProps.course}<br>
        <b>Aika:</b> ${info.event.extendedProps.time}
      `;
      document.getElementById("modal").style.display = "block";
    }
  });

  calendar.render();
});

// sulje modal
function closeModal() {
  document.getElementById("modal").style.display = "none";
}

// klikkaus ulkopuolelle sulkee
window.onclick = function(event) {
  const modal = document.getElementById("modal");
  if (event.target === modal) {
    modal.style.display = "none";
  }
};

function showFreeToday() {
  const today = new Date().toISOString().split("T")[0];
  const city = document.getElementById("cityFilter").value;

  const free = getFreeCourses(today, city);

  const container = document.getElementById("freeCoursesList");

  if (free.length === 0) {
    container.innerHTML = "Ei vapaita ratoja";
    return;
  }

  container.innerHTML = free
    .map(c => `<div>✅ ${c.name} (${c.city})</div>`)
    .join("");
}
