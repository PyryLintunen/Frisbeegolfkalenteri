<!DOCTYPE html>
<html lang="fi">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <title>Kiekkokalenteri</title>

  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">

  <style>
    body { font-family: Arial, sans-serif; margin: 20px; background: #f4f6f8; }
    h1 { text-align: center; }

    .main-container {
      display: flex;
      flex-direction: row;
      gap: 20px;
      max-width: 98%;
      margin: 0 auto;
      align-items: flex-start;
    }

    #calendar {
      flex: 4;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.12);
      min-height: 800px;
    }

    .side-panel {
      flex: 1;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.12);
      min-width: 320px;
      position: sticky;
      top: 20px;
    }

    .info-box {
      background-color: #f8f9fa;
      border-left: 5px solid #007bff;
      padding: 15px;
      margin-bottom: 25px;
      border-radius: 4px;
      font-size: 0.9em;
      white-space: pre-line;
    }

    @media (max-width: 1100px) {
      .main-container { flex-direction: column; }
      .side-panel { width: 100%; position: static; order: 2; }
      #calendar { width: 100%; min-height: 500px; order: 1; }
    }

    .modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
    .modal-content { background: white; margin: 15% auto; padding: 20px; width: 90%; max-width: 400px; border-radius: 12px; }
    .close { float: right; font-size: 24px; cursor: pointer; }
    
    select, button { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; }
    button { cursor: pointer; font-weight: bold; border: none; }
  </style>
</head>
<body>

<h1>Kiekkokalenteri</h1>

<div class="main-container">
  <div id="calendar"></div>

  <div class="side-panel">
    <div class="info-box">
      <h3>Tietoa kalenterista</h3>
      Suodata kisoja maakunnan mukaan.
      <small>Päivitetty: 6.5.2026</small>
    </div>

    <h2>Suodatus & vapaat radat</h2>

    <label>Valitse maakunta:</label>
    <select id="regionFilter" onchange="updateCityFilter()">
      <option value="all">Kaikki maakunnat</option>
      <option value="Uusimaa">Uusimaa</option>
      <option value="Varsinais-Suomi">Varsinais-Suomi</option>
    </select>

    <label>Valitse kunta:</label>
    <select id="cityFilter">
      <option value="all">Kaikki kunnat</option>
    </select>

    <div style="margin-bottom: 15px;">
      <input type="checkbox" id="includeNeighbors" checked>
      <label for="includeNeighbors">Näytä myös naapurikunnat</label>
    </div>

    <button onclick="applyFilters()" style="background: #28a745; color: white;">Päivitä kalenteri</button>
    <button onclick="showFreeToday()" style="background: #007bff; color: white;">Hae vapaat radat tänään</button>

    <div id="freeCoursesList" style="margin-top: 20px;"></div>
  </div>
</div>

<div id="modal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">&times;</span>
    <h3 id="modalTitle"></h3>
    <div id="modalInfo"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<script>
  // GLOBAALIT MUUTTUJAT
  let calendar;
  let events = [];

  // 1. KAIKKI RADAT (Uusimaa + Varsinais-Suomi)
  const allCourses = [
    { name: "Kivikon frisbeegolfrata", city: "Helsinki", region: "Uusimaa" },
    { name: "Talin frisbeegolfpuisto", city: "Helsinki", region: "Uusimaa" },
    { name: "Siltamäki", city: "Helsinki", region: "Uusimaa" },
    { name: "Paloheinän frisbeegolfrata", city: "Helsinki", region: "Uusimaa" },
    { name: "Äijänpelto", city: "Espoo", region: "Uusimaa" },
    { name: "Puolarmaari", city: "Espoo", region: "Uusimaa" },
    { name: "Lakisto", city: "Espoo", region: "Uusimaa" },
    { name: "Oittaa Kalliometsä", city: "Espoo", region: "Uusimaa" },
    { name: "Keinukallio", city: "Kerava", region: "Uusimaa" },
    { name: "Ford DiscGolfPark", city: "Tuusula", region: "Uusimaa" },
    { name: "Lemmenlaakso", city: "Järvenpää", region: "Uusimaa" },
    { name: "Sibbe Disc Golf", city: "Sipoo", region: "Uusimaa" },
    { name: "Talma DGP", city: "Sipoo", region: "Uusimaa" },
    { name: "Nummenmäki DiscGolfPark", city: "Hyvinkää", region: "Uusimaa" },
    { name: "Laakspohja", city: "Lohja", region: "Uusimaa" },
    { name: "Herusten frisbeegolfrata", city: "Nurmijärvi", region: "Uusimaa" },
    { name: "Aninkainen", city: "Turku", region: "Varsinais-Suomi" },
    { name: "Lauste", city: "Turku", region: "Varsinais-Suomi" },
    { name: "Moision frisbeegolfrata", city: "Turku", region: "Varsinais-Suomi" },
    { name: "Pansion frisbeegolfrata", city: "Turku", region: "Varsinais-Suomi" },
    { name: "Urheilupuisto", city: "Turku", region: "Varsinais-Suomi" },
    { name: "Kaarinan frisbeegolfrata", city: "Kaarina", region: "Varsinais-Suomi" },
    { name: "Liedon frisbeegolfrata", city: "Lieto", region: "Varsinais-Suomi" },
    { name: "Naantalin frisbeegolfrata", city: "Naantali", region: "Varsinais-Suomi" },
    { name: "Maskun frisbeegolfrata", city: "Masku", region: "Varsinais-Suomi" },
    { name: "Riviera", city: "Masku", region: "Varsinais-Suomi" },
    { name: "Paimion frisbeegolfpuisto", city: "Paimio", region: "Varsinais-Suomi" },
    { name: "Sauvon frisbeegolfrata", city: "Sauvo", region: "Varsinais-Suomi" },
    { name: "Ruskon frisbeegolfrata", city: "Rusko", region: "Varsinais-Suomi" },
    { name: "Mynämäen frisbeegolfrata", city: "Mynämäki", region: "Varsinais-Suomi" },
    { name: "Paraisten frisbeegolfrata", city: "Parainen", region: "Varsinais-Suomi" },
    { name: "Uudenkaupungin frisbeegolfrata", city: "Uusikaupunki", region: "Varsinais-Suomi" },
    { name: "Laitilan frisbeegolfrata", city: "Laitila", region: "Varsinais-Suomi" },
    { name: "Rauman frisbeegolfrata", city: "Rauma", region: "Varsinais-Suomi" },
    { name: "Kustavin frisbeegolfrata", city: "Kustavi", region: "Varsinais-Suomi" },
    { name: "Taivassalon frisbeegolfrata", city: "Taivassalo", region: "Varsinais-Suomi" },
    { name: "Vehmaan frisbeegolfrata", city: "Vehmaa", region: "Varsinais-Suomi" },
    { name: "Nousiaisten frisbeegolfrata", city: "Nousiainen", region: "Varsinais-Suomi" },
    { name: "Pöytyän frisbeegolfrata", city: "Pöytyä", region: "Varsinais-Suomi" },
    { name: "Oripään frisbeegolfrata", city: "Oripää", region: "Varsinais-Suomi" },
    { name: "Loimaan frisbeegolfrata", city: "Loimaa", region: "Varsinais-Suomi" },
    { name: "Someron frisbeegolfrata", city: "Somero", region: "Varsinais-Suomi" },
    { name: "Marttilan frisbeegolfrata", city: "Marttila", region: "Varsinais-Suomi" },
    { name: "Koski TL frisbeegolfrata", city: "Koski TL", region: "Varsinais-Suomi" }
  ];

  // 2. NAAPURIKUNNAT
  const neighbors = {
    "Espoo": ["Helsinki", "Vantaa", "Kirkkonummi", "Vihti"],
    "Helsinki": ["Espoo", "Vantaa", "Sipoo"],
    "Kerava": ["Tuusula", "Vantaa", "Sipoo", "Järvenpää"],
    "Tuusula": ["Vantaa", "Kerava", "Järvenpää", "Nurmijärvi", "Hyvinkää", "Sipoo"],
    "Järvenpää": ["Tuusula", "Sipoo", "Kerava"],
    "Hyvinkää": ["Tuusula", "Nurmijärvi", "Vihti", "Riihimäki"],
    "Turku": ["Kaarina", "Lieto", "Naantali", "Rusko", "Raisio"],
    "Kaarina": ["Turku", "Lieto", "Pargas", "Paimio"]
  };

  // 3. APUFUNKTIOT
  function normalize(str) {
    if (!str) return "";
    return str.toLowerCase().replace(/frisbeegolfrata|frisbeegolfpuisto|disc golf|dgp|[()]/g, "").trim();
  }

  function updateCityFilter() {
    const region = document.getElementById("regionFilter").value;
    const citySelect = document.getElementById("cityFilter");
    const uniqueCities = [...new Set(allCourses
      .filter(c => region === "all" || c.region === region)
      .map(c => c.city))].sort();

    citySelect.innerHTML = '<option value="all">Kaikki kunnat</option>';
    uniqueCities.forEach(city => {
      citySelect.innerHTML += `<option value="${city}">${city}</option>`;
    });
  }

  function applyFilters() {
    const selectedRegion = document.getElementById("regionFilter").value;
    const selectedCity = document.getElementById("cityFilter").value;
    const includeNeighbors = document.getElementById("includeNeighbors").checked;

    const filteredEvents = events.filter(event => {
      const matchesRegion = (selectedRegion === "all" || event.extendedProps.region === selectedRegion);
      let matchesCity = true;
      if (selectedCity !== "all") {
        const courseInfo = allCourses.find(c => normalize(c.name) === normalize(event.title));
        const eventCity = courseInfo ? courseInfo.city : "";
        let targetCities = [selectedCity];
        if (includeNeighbors && neighbors[selectedCity]) {
          targetCities = [selectedCity, ...neighbors[selectedCity]];
        }
        matchesCity = targetCities.includes(eventCity);
      }
      return matchesRegion && matchesCity;
    });

    calendar.removeAllEvents();
    calendar.addEventSource(filteredEvents);
  }

  function getFreeCourses(dateStr, selectedCity) {
    const busy = events.filter(e => e.start.startsWith(dateStr)).map(e => normalize(e.title));
    return allCourses.filter(c => {
      if (selectedCity !== "all" && c.city !== selectedCity) return false;
      return !busy.some(b => b.includes(normalize(c.name)) || normalize(c.name).includes(b));
    });
  }

  function showFreeToday() {
    const today = new Date().toISOString().split("T")[0];
    const selectedCity = document.getElementById("cityFilter").value;
    const container = document.getElementById("freeCoursesList");
    if (selectedCity === "all") { container.innerHTML = "<p>Valitse kunta ensin.</p>"; return; }

    const freeMain = getFreeCourses(today, selectedCity);
    let html = `<h3>📍 ${selectedCity}</h3>`;
    freeMain.forEach(c => html += `<div style="padding:5px; background:#e8f4fd; margin-bottom:4px; border-left:3px solid #007bff;">✅ ${c.name}</div>`);
    if(freeMain.length === 0) html += "<p>Ei vapaita ratoja.</p>";
    container.innerHTML = html;
  }

  function closeModal() { document.getElementById("modal").style.display = "none"; }

  // 4. PÄÄOHJELMA (Latautuu kun sivu on valmis)
  document.addEventListener('DOMContentLoaded', function() {
    // METRIX DATA
    const rawData = `
Uusimaa, Kerava	05/05/2026 18:00	Viikoittain	Keinukallio 2024 → Normaali layout
Uusimaa, Nurmijärvi	05/05/2026 18:00	Viikoittain	Nurmijärvi-Herusten frisbeegolfrata → 2023
Uusimaa, Helsinki	05/05/2026 07:30	Viikoittain	Paloheinän frisbeegolfrata → 18
Uusimaa, Lohja	06/05/2026 18:00	C - PDGA	Laakspohja Disc Golf Course → Kesä2025
Uusimaa, Tuusula	06/05/2026 18:00	Viikoittain	Ford DiscGolfPark → Punaiset
Uusimaa, Sipoo	07/05/2026 18:00	Viikoittain	Talma DiscGolfPark → 2023
Uusimaa, Järvenpää	07/05/2026 18:00	C - PDGA	Lemmenlaakson frisbeegolfrata → 05/2023
    `;

    const lines = rawData.trim().split("\n");
    lines.forEach(line => {
      const parts = line.split("\t");
      if (parts.length < 4) return;
      const locationPart = parts[0];
      const dateTime = parts[1];
      const coursePart = parts[3];
      
      const region = locationPart.includes(",") ? locationPart.split(",")[0].trim() : "Uusimaa";
      const [date, time] = dateTime.split(" ");
      const [d, m, y] = date.split("/");
      
      events.push({
        title: coursePart.split("→")[0].trim(),
        start: `${y}-${m}-${d}T${time}`,
        extendedProps: { region: region, time: time }
      });
    });

    const calendarEl = document.getElementById('calendar');
    calendar = new FullCalendar.Calendar(calendarEl, {
      locale: 'fi',
      initialView: window.innerWidth < 768 ? 'listMonth' : 'dayGridMonth',
      events: events,
      eventClick: function(info) {
        document.getElementById("modalTitle").innerText = info.event.title;
        document.getElementById("modalInfo").innerHTML = `<b>Maakunta:</b> ${info.event.extendedProps.region}<br><b>Aika:</b> ${info.event.extendedProps.time}`;
        document.getElementById("modal").style.display = "block";
      }
    });
    calendar.render();
    updateCityFilter();
  });
</script>

</body>
</html>
