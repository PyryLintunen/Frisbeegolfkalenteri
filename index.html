<script>
document.addEventListener('DOMContentLoaded', function () {

  // 👉 LIITÄ METRIX DATA TÄHÄN
  const rawData = `
NBDG Extra™ Kivikko
Uusimaa, Helsinki	29/04/2026 18:00	C - PDGA	Kivikon frisbeegolfrata → 2023 Blue 18 - Par 56
Laakspohja DGC viikkokilpailu → Best Shot Parikisakierros
Uusimaa, Lohja	29/04/2026 18:00	Parikilpailu	Laakspohja Disc Golf Course → Kesä2025-Par62
Loviisan viikkokisat 2026 → #7 Parikilpailu
Uusimaa, Loviisa	29/04/2026 18:00	Parikilpailu Viikoittain	Loviisan frisbeegolfrata → Loviisa 21 b väylät
Puolarmaarin viikkokilpailut 2026 → Yksilökisat 29.4
Uusimaa, Espoo	29/04/2026 18:00	Viikoittain	Puolarmaarin frisbeegolfrata → Puolarmaarin viikkokisa layout
FRISBEEGOLFCLUB HYRYLÄ VIIKKOKILPAILUT FORD AMATEUR DISCGOLFPARKISSA → Ford Amateur DGP viikkokilpailut 29.4.2026
Uusimaa, Tuusula	29/04/2026 18:00	Viikoittain	Ford Amateur DiscGolfPark (A1) → 1
Mäntsälän viikkokisat 2026 → MegaMäny Parikisa
Uusimaa, Mäntsälä	29/04/2026 18:00	Parikilpailu Viikoittain	Mäntsälän frisbeegolfpuisto → MegaMäny 2021
Sb-Hem - Veckotävling / Viikkokisa - VÄSTERBY - A (AM) → 29.04
Uusimaa, Raasepori	29/04/2026 18:00		Västerby, Tammisaari → VÄSTERBY - A (AM)
  `;

  const lines = rawData.split("\n").map(l => l.trim()).filter(l => l);

  const events = [];

  for (let i = 0; i < lines.length; i += 2) {
    const titleLine = lines[i];
    const infoLine = lines[i + 1];

    if (!infoLine) continue;

    const parts = infoLine.split("\t");

    const dateTime = parts[1]; // 29/04/2026 18:00
    const coursePart = parts[3]; // rata

    if (!dateTime || !coursePart) continue;

    const [date, time] = dateTime.split(" ");
    const [day, month, year] = date.split("/");

    const formattedDate = `${year}-${month}-${day}T${time}`;

    const course = coursePart.split("→")[0].trim();

    events.push({
      title: `${titleLine} - ${course}`,
      start: formattedDate
    });
  }

  const calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
    initialView: 'dayGridMonth',
    events: events,

    eventClick: function(info) {
      alert(info.event.title);
    }
  });

  calendar.render();
});
</script>
