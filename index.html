<!DOCTYPE html>
<html lang="fi">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <title>Kiekkokalenteri</title>

  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">

  <style>
    body { font-family: Arial, sans-serif; margin: 20px; background: #f4f6f8; }
    h1 { text-align: center; }

    .main-container {
      display: flex;
      flex-direction: row;
      gap: 20px;
      max-width: 98%;
      margin: 0 auto;
      align-items: flex-start;
    }

    #calendar {
      flex: 4;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.12);
      min-height: 800px;
    }

    .side-panel {
      flex: 1;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.12);
      min-width: 320px;
      position: sticky;
      top: 20px;
    }

    .info-box {
      background-color: #f8f9fa;
      border-left: 5px solid #007bff;
      padding: 15px;
      margin-bottom: 25px;
      border-radius: 4px;
      font-size: 0.9em;
      white-space: pre-line;
    }

    @media (max-width: 1100px) {
      .main-container { flex-direction: column; }
      .side-panel { width: 100%; position: static; order: 2; }
      #calendar { width: 100%; min-height: 500px; order: 1; }
    }

    .modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
    .modal-content { background: white; margin: 15% auto; padding: 20px; width: 90%; max-width: 400px; border-radius: 12px; }
    .close { float: right; font-size: 24px; cursor: pointer; }
    
    select, button { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; }
    button { cursor: pointer; font-weight: bold; border: none; }
  </style>
</head>
<body>

<h1>Kiekkokalenteri</h1>

<div class="main-container">
  <div id="calendar"></div>

  <div class="side-panel">
    <div class="info-box">
      <h3>Tietoa kalenterista</h3>
      Suodata kisoja maakunnan mukaan.
      <small>Päivitetty: 6.5.2026</small>
    </div>

    <h2>Suodatus & vapaat radat</h2>

    <label>Valitse maakunta:</label>
    <select id="regionFilter" onchange="updateCityFilter()">
      <option value="all">Kaikki maakunnat</option>
      <option value="Kanta-Häme">Kanta-Häme</option>
      <option value="Uusimaa">Uusimaa</option>
      <option value="Varsinais-Suomi">Varsinais-Suomi</option>
    </select>

    <label>Valitse kunta:</label>
    <select id="cityFilter">
      <option value="all">Kaikki kunnat</option>
    </select>

    <div style="margin-bottom: 15px;">
      <input type="checkbox" id="includeNeighbors" checked>
      <label for="includeNeighbors">Näytä myös naapurikunnat</label>
    </div>

    <button onclick="applyFilters()" style="background: #28a745; color: white;">Päivitä kalenteri</button>
    <button onclick="showFreeToday()" style="background: #007bff; color: white;">Hae vapaat radat tänään</button>

    <div id="freeCoursesList" style="margin-top: 20px;"></div>
  </div>
</div>

<div id="modal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">&times;</span>
    <h3 id="modalTitle"></h3>
    <div id="modalInfo"></div>
  </div>
</div>

  // 3. APUFUNKTIOT
 function normalize(str) {
    if (!str) return "";
    return str.toLowerCase()
      .replace(/frisbeegolfrata|frisbeegolfpuisto|disc golf|dgp|[()]/g, "")
      .replace(/\s+/g, "") // Poistaa välilyönnit
      .trim();
  }

  function updateCityFilter() {
    const region = document.getElementById("regionFilter").value;
    const citySelect = document.getElementById("cityFilter");
    
    // Suodatetaan vain ne kaupungit, jotka kuuluvat valittuun maakuntaan
    const uniqueCities = [...new Set(allCourses
      .filter(c => region === "all" || c.region === region)
      .map(c => c.city))].sort();

    // Tyhjennetään valikko ja lisätään uudet vaihtoehdot
    citySelect.innerHTML = '<option value="all">Kaikki kunnat</option>';
    uniqueCities.forEach(city => {
      citySelect.innerHTML += `<option value="${city}">${city}</option>`;
    });
  }

  function applyFilters() {
    const selectedRegion = document.getElementById("regionFilter").value;
    const selectedCity = document.getElementById("cityFilter").value;
    const includeNeighbors = document.getElementById("includeNeighbors").checked;

    const filteredEvents = events.filter(event => {
      // 1. Maakuntasuodatus
      const matchesRegion = (selectedRegion === "all" || event.extendedProps.region === selectedRegion);
      
      // 2. Kuntasuodatus
      let matchesCity = true;
      if (selectedCity !== "all") {
        const normalizedEventTitle = normalize(event.title);
        // Etsitään radan tiedot vertaamalla molempia nimiä normalisoituna
        const courseInfo = allCourses.find(c => normalize(c.name) === normalizedEventTitle);
        
        const eventCity = courseInfo ? courseInfo.city : "";
        let targetCities = [selectedCity];
        
        if (includeNeighbors && neighbors[selectedCity]) {
          targetCities = [selectedCity, ...neighbors[selectedCity]];
        }
        
        matchesCity = targetCities.includes(eventCity);
      }
      
      return matchesRegion && matchesCity;
    });

    calendar.removeAllEvents();
    calendar.addEventSource(filteredEvents);
  }

  function getFreeCourses(dateStr, selectedCity) {
    const busy = events
      .filter(e => e.start.startsWith(dateStr))
      .map(e => normalize(e.title));

    return allCourses.filter(c => {
      if (selectedCity !== "all" && c.city !== selectedCity) return false;
      const normalizedName = normalize(c.name);
      // Rata on varattu, jos sen normalisoitu nimi löytyy busy-listalta
      return !busy.includes(normalizedName);
    });
  }

  function showFreeToday() {
    const now = new Date();
  const offset = now.getTimezoneOffset() * 60000;
  const localISOTime = new Date(now - offset).toISOString().split("T")[0];
  const today = localISOTime;
    const selectedRegion = document.getElementById("regionFilter").value;
    const selectedCity = document.getElementById("cityFilter").value;
    const container = document.getElementById("freeCoursesList");
    
    let html = `<h2>Vapaat radat ${today}</h2>`;

    if (selectedCity !== "all") {
      // NÄYTETÄÄN YKSITTÄINEN KUNTA JA NAAPURIT (kuten tähänkin asti)
      const freeMain = getFreeCourses(today, selectedCity);
      html += `<h3>📍 ${selectedCity}</h3>`;
      
      if (freeMain.length === 0) {
        html += "<p>Ei täysin vapaita ratoja (kisoja kaikilla radoilla).</p>";
      } else {
        freeMain.forEach(c => {
          html += `<div style="padding:5px; background:#e8f4fd; margin-bottom:4px; border-left:3px solid #007bff;">✅ ${c.name}</div>`;
        });
      }

      const myNeighbors = neighbors[selectedCity] || [];
      let neighborHtml = "";
      myNeighbors.forEach(nCity => {
        const freeInNeighbor = getFreeCourses(today, nCity);
        if (freeInNeighbor.length > 0) {
          neighborHtml += `<p><strong>${nCity}:</strong> ${freeInNeighbor.map(c => c.name).join(", ")}</p>`;
        }
      });
      if (neighborHtml) html += "<hr><h4>Naapurikunnat:</h4>" + neighborHtml;

    } else {
      // NÄYTETÄÄN KOKO MAAKUNTA (Uusi ominaisuus)
      if (selectedRegion === "all") {
        html += "<p>Valitse maakunta nähdäksesi kaikki vapaat radat.</p>";
      } else {
        html += `<h3>🌍 Maakunta: ${selectedRegion}</h3>`;
        
        // Haetaan kaikki maakunnan kunnat, joissa on ratoja
        const citiesInRegion = [...new Set(allCourses
          .filter(c => c.region === selectedRegion)
          .map(c => c.city))].sort();

        citiesInRegion.forEach(city => {
          const freeInCity = getFreeCourses(today, city);
          if (freeInCity.length > 0) {
            html += `<div style="margin-top:10px;"><strong>${city}:</strong><br>`;
            html += freeInCity.map(c => `<span style="display:inline-block; background:#e8f4fd; padding:2px 8px; margin:2px; border-radius:4px; font-size:0.85em;">${c.name}</span>`).join(" ");
            html += `</div>`;
          }
        });
      }
    }
    
    container.innerHTML = html;
  }

    `;

    const lines = rawData.trim().split("\n");
    lines.forEach(line => {
      if (line.startsWith("#") || !line.trim()) return;
      const parts = line.split("\t");
      if (parts.length < 4) return;
      const locationPart = parts[0];
      const dateTime = parts[1];
      const coursePart = parts[3];
      
      const region = locationPart.includes(",") ? locationPart.split(",")[0].trim() : "Uusimaa";
      const [date, time] = dateTime.split(" ");
      const [d, m, y] = date.split("/");
      
      const eventDate = new Date(`${y}-${m}-${d}T${time}`);
      const todayStart = new Date();
      todayStart.setHours(0, 0, 0, 0); // Asetetaan kello päivän alkuun

      const formattedTitle = coursePart.includes("→") 
        ? `${coursePart.split("→")[0].trim()} (${coursePart.split("→")[1].trim()})`
        : coursePart.trim();

      if (eventDate >= todayStart) {
        events.push({
          title: formattedTitle,
          start: `${y}-${m}-${d}T${time}`,
          extendedProps: { region: region, time: time }
        });
      }
    });

    const calendarEl = document.getElementById('calendar');
    calendar = new FullCalendar.Calendar(calendarEl, {
      locale: 'fi',
      firstDay: 1,
      weekNumbers: true,
      weekText: 'vk',
      nowIndicator: true,
      validRange: {
        start: new Date().toISOString().split("T")[0]
      },
      initialView: window.innerWidth < 768 ? 'listMonth' : 'dayGridMonth',
      events: events,
      eventClick: function(info) {
        document.getElementById("modalTitle").innerText = info.event.title;
        document.getElementById("modalInfo").innerHTML = `<b>Maakunta:</b> ${info.event.extendedProps.region}<br><b>Aika:</b> ${info.event.extendedProps.time}`;
        document.getElementById("modal").style.display = "block";
      }
    });
    calendar.render();
    updateCityFilter();
  });
